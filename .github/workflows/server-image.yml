name: Relay container

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "symconnect/server.py"
      - "symconnect/protocol.py"
      - "symconnect/static/**"
      - "requirements-server.txt"
      - "Dockerfile"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish relay image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/symconnect-relay:latest
            ghcr.io/${{ github.repository_owner }}/symconnect-relay:${{ github.sha }}
