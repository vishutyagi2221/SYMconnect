name: Windows installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: Source version to build (leave blank to use symconnect/version.py)
        required: false
        default: ""
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: windows-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    env:
      SERVER_URL: ${{ vars.SYMCONNECT_SERVER_URL }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-build.txt

      - name: Resolve and validate build version
        shell: pwsh
        run: |
          $sourceVersion = python -c "from symconnect.version import VERSION; print(VERSION)"
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
          } elseif (-not [string]::IsNullOrWhiteSpace('${{ inputs.version }}')) {
            $version = '${{ inputs.version }}'
          } else {
            $version = $sourceVersion
          }
          if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
            throw "Invalid build version: $version"
          }
          if ($version -ne $sourceVersion) {
            throw "Build version $version does not match source version $sourceVersion"
          }
          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Validate relay URL
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SERVER_URL)) {
            $env:SERVER_URL = 'wss://symconnect.onrender.com'
            Write-Host "SYMCONNECT_SERVER_URL variable not set. Using default: $env:SERVER_URL"
          }
          if ($env:SERVER_URL -notmatch '^wss?://') {
            throw 'SYMCONNECT_SERVER_URL must use wss:// or ws://'
          }
          New-Item -ItemType Directory -Force -Path build-config | Out-Null
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD 'build-config\server_url.txt'),
            $env:SERVER_URL.Trim().TrimEnd('/'),
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Install Python build dependencies
        run: python -m pip install --upgrade -r requirements-build.txt

      - name: Run release preflight
        shell: pwsh
        run: |
          python -m compileall -q symconnect tests
          if ($LASTEXITCODE -ne 0) { throw 'Python syntax validation failed' }
          node --check .\symconnect\static\app.js
          if ($LASTEXITCODE -ne 0) { throw 'JavaScript syntax validation failed' }
          python -m pytest -q
          if ($LASTEXITCODE -ne 0) { throw 'Tests failed' }

      - name: Build application
        run: python -m PyInstaller --clean --noconfirm SYMconnect.spec

      - name: Download verified WebView2 bootstrapper
        shell: pwsh
        run: |
          $path = '.\installer\MicrosoftEdgeWebView2Setup.exe'
          Invoke-WebRequest `
            -Uri 'https://go.microsoft.com/fwlink/p/?LinkId=2124703' `
            -OutFile $path `
            -UseBasicParsing
          $signature = Get-AuthenticodeSignature -LiteralPath $path
          if (
            $signature.Status -ne 'Valid' -or
            $signature.SignerCertificate.Subject -notmatch 'Microsoft Corporation'
          ) {
            throw "Invalid WebView2 bootstrapper signature: $($signature.Status)"
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' "/DMyAppVersion=$env:BUILD_VERSION" '.\installer\SYMconnect.iss'
          if ($LASTEXITCODE -ne 0) { throw 'Inno Setup build failed' }

      - name: Write release metadata
        shell: pwsh
        run: |
          $installer = ".\installer\output\SYMconnect-Setup-$env:BUILD_VERSION.exe"
          $assetName = "SYMconnect-Setup-$env:BUILD_VERSION.exe"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer).Hash.ToLowerInvariant()
          "$hash  *$assetName" | Set-Content -Encoding ascii "$installer.sha256"
          $manifest = [ordered]@{
            version = $env:BUILD_VERSION
            download_url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/v$env:BUILD_VERSION/$assetName"
            size = (Get-Item -LiteralPath $installer).Length
            sha256 = $hash
          } | ConvertTo-Json
          [System.IO.File]::WriteAllText(
            (Join-Path $PWD 'installer\output\update.json'),
            "$manifest`n",
            [System.Text.UTF8Encoding]::new($false)
          )

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: SYMconnect-Setup-${{ env.BUILD_VERSION }}
          path: |
            installer/output/SYMconnect-Setup-${{ env.BUILD_VERSION }}.exe
            installer/output/SYMconnect-Setup-${{ env.BUILD_VERSION }}.exe.sha256
            installer/output/update.json
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release atomically
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $installer = ".\installer\output\SYMconnect-Setup-$env:BUILD_VERSION.exe"
          $checksum = "$installer.sha256"
          $manifest = ".\installer\output\update.json"
          $previousErrorPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          $releaseJson = gh release view $tag --json isDraft 2>$null
          $viewExitCode = $LASTEXITCODE
          $ErrorActionPreference = $previousErrorPreference
          if ($viewExitCode -ne 0) {
            gh release create $tag `
              --draft `
              --verify-tag `
              --generate-notes `
              --title "SYMconnect $env:BUILD_VERSION"
            if ($LASTEXITCODE -ne 0) { throw 'Could not create draft GitHub release' }
            $isDraft = $true
          } else {
            $isDraft = ($releaseJson | ConvertFrom-Json).isDraft
          }

          gh release upload $tag $installer $checksum $manifest --clobber
          if ($LASTEXITCODE -ne 0) { throw 'Could not upload release assets' }

          if ($isDraft) {
            gh release edit $tag --draft=false --latest
            if ($LASTEXITCODE -ne 0) { throw 'Could not publish GitHub release' }
          }
